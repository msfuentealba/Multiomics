<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sampling & p-value Explorer</title>
<style>
  :root{
    --ink:#12222e;
    --paper:#f6f4ef;
    --grid:#d9d3c7;
    --pop:#3b6ea5;
    --pop-fill:rgba(59,110,165,.14);
    --treat:#c2452d;
    --treat-soft:rgba(194,69,45,.10);
    --muted:#6b6459;
    --line:#c9c2b4;
  }
  *{box-sizing:border-box}
  body{
    margin:0;background:var(--paper);color:var(--ink);
    font-family:"Iowan Old Style",Georgia,"Times New Roman",serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:960px;margin:0 auto;padding:32px 20px 60px}
  header h1{
    font-size:clamp(26px,4vw,38px);margin:0 0 4px;letter-spacing:-.5px;
  }
  header p{margin:0;color:var(--muted);font-size:15px;
    font-family:ui-monospace,"SF Mono",Menlo,monospace;letter-spacing:.3px}
  .rule{height:2px;background:var(--ink);margin:18px 0 26px}

  .grid{display:grid;grid-template-columns:280px 1fr;gap:28px}
  @media(max-width:760px){.grid{grid-template-columns:1fr}}

  .panel{background:#fff;border:1px solid var(--line);border-radius:2px;padding:20px}
  .panel h2{margin:0 0 16px;font-size:13px;text-transform:uppercase;
    letter-spacing:2px;font-family:ui-monospace,monospace;color:var(--muted)}

  .field{margin-bottom:16px}
  .field label{display:flex;justify-content:space-between;font-size:13px;
    font-family:ui-monospace,monospace;margin-bottom:6px}
  .field label span{color:var(--muted)}
  .field input{width:100%;padding:8px 10px;border:1px solid var(--line);
    border-radius:2px;font-family:ui-monospace,monospace;font-size:15px;
    background:var(--paper);color:var(--ink)}
  .field input:focus{outline:2px solid var(--pop);outline-offset:-1px}

  .pop{border-top:1px dashed var(--line);padding-top:16px;margin-top:20px}
  .poptitle{font-size:11px;text-transform:uppercase;letter-spacing:2px;
    font-family:ui-monospace,monospace;color:var(--treat);margin-bottom:14px}
  .pop input:focus{outline-color:var(--pop)}

  button{width:100%;padding:11px;margin-top:6px;background:var(--ink);color:var(--paper);
    border:none;border-radius:2px;font-family:ui-monospace,monospace;font-size:13px;
    letter-spacing:1px;text-transform:uppercase;cursor:pointer}
  button:hover{background:var(--treat)}

  .tail{display:flex;gap:8px;margin-top:4px}
  .tail button{margin:0;flex:1;background:var(--paper);color:var(--ink);
    border:1px solid var(--line);font-size:11px;padding:8px 4px}
  .tail button.on{background:var(--pop);color:#fff;border-color:var(--pop)}
  .tail button:hover{background:var(--pop);color:#fff}

  svg{width:100%;height:auto;display:block}
  .axis text{font-family:ui-monospace,monospace;font-size:10px;fill:var(--muted)}
  .axis line{stroke:var(--grid)}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;
    background:var(--line);border:1px solid var(--line);margin-top:20px}
  .stat{background:#fff;padding:14px 12px}
  .stat .k{font-size:11px;text-transform:uppercase;letter-spacing:1px;
    color:var(--muted);font-family:ui-monospace,monospace}
  .stat .v{font-size:24px;margin-top:4px;font-variant-numeric:tabular-nums}
  .stat.p .v{color:var(--treat)}
  .verdict{margin-top:16px;padding:12px 14px;border-left:3px solid var(--treat);
    background:var(--treat-soft);font-size:14px;line-height:1.5}
  .verdict b{font-family:ui-monospace,monospace}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Sampling &amp; p-value Explorer</h1>
    <p id="hdr">H₀: μ = 100 · σ = 15 · n = 100</p>
  </header>
  <div class="rule"></div>

  <div class="grid">
    <div class="panel">
      <h2>Population (H₀)</h2>
      <div class="field">
        <label>Mean (μ) <span>null hypothesis</span></label>
        <input id="mu" type="number" value="100" step="0.1">
      </div>
      <div class="field">
        <label>Std dev (σ) <span>population</span></label>
        <input id="sigma" type="number" value="15" step="0.1" min="0.1">
      </div>

      <div class="pop">
        <div class="poptitle">Your sample</div>
        <div class="field">
          <label>Sample mean (x̄) <span id="mLab"></span></label>
          <input id="mean" type="number" value="103" step="0.1">
        </div>
        <div class="field">
          <label>Sample SD (s) <span>optional</span></label>
          <input id="sd" type="number" value="15" step="0.1" min="0.1">
        </div>
        <div class="field">
          <label>Sample size (n) <span id="seLab">SE = 1.50</span></label>
          <input id="n" type="number" value="100" step="1" min="2">
        </div>
        <div class="field">
          <label>Test type <span>tail</span></label>
          <div class="tail">
            <button data-t="two" class="on">Two‑tailed</button>
            <button data-t="right">Right</button>
            <button data-t="left">Left</button>
          </div>
        </div>
        <button id="run">Draw sample &amp; test</button>
      </div>
    </div>

    <div class="panel">
      <h2>Sampling distribution of the mean</h2>
      <svg id="plot" viewBox="0 0 640 320" role="img" aria-label="sampling distribution"></svg>

      <div class="stats">
        <div class="stat"><div class="k">z‑score</div><div class="v" id="z">–</div></div>
        <div class="stat"><div class="k">Std error</div><div class="v" id="se">1.50</div></div>
        <div class="stat p"><div class="k">p‑value</div><div class="v" id="p">–</div></div>
      </div>
      <div class="verdict" id="verdict">Set your sample parameters, then click “Draw sample &amp; test.”</div>
    </div>
  </div>
</div>

<script>
let MU=100, SIGMA=15, N=100, SE=SIGMA/Math.sqrt(N);
let tail="two";

function readPop(){
  MU    = parseFloat(document.getElementById("mu").value);
  SIGMA = parseFloat(document.getElementById("sigma").value);
  N     = parseFloat(document.getElementById("n").value);
  if(isNaN(MU))MU=100;
  if(isNaN(SIGMA)||SIGMA<=0)SIGMA=15;
  if(isNaN(N)||N<2)N=2;
  SE=SIGMA/Math.sqrt(N);
  document.getElementById("hdr").textContent=
    `H₀: μ = ${MU} · σ = ${SIGMA} · n = ${N}`;
  document.getElementById("seLab").textContent=`SE = ${SE.toFixed(2)}`;
}

function normPdf(x,m,s){return Math.exp(-0.5*((x-m)/s)**2)/(s*Math.sqrt(2*Math.PI));}
// standard normal CDF (Abramowitz-Stegun)
function normCdf(z){
  const t=1/(1+0.2316419*Math.abs(z));
  const d=0.3989423*Math.exp(-z*z/2);
  let p=d*t*(0.3193815+t*(-0.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));
  return z>0?1-p:p;
}
// Box-Muller standard normal draw
function gauss(){
  let u=0,v=0;
  while(u===0)u=Math.random();
  while(v===0)v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}

const svg=document.getElementById("plot");
const W=640,H=320,PADL=30,PADR=20,PADB=34,PADT=18;
let x0,x1,peak;
const sx=v=>PADL+(v-x0)/(x1-x0)*(W-PADL-PADR);
const sy=v=>H-PADB-(v/peak)*(H-PADB-PADT);

function draw(xbar,z){
  x0=MU-4*SE; x1=MU+4*SE;          // domain ±4 SE (recomputed)
  peak=normPdf(MU,MU,SE);
  let s="";
  // axis
  s+=`<g class="axis">`;
  for(let k=-4;k<=4;k++){
    const v=MU+k*SE, X=sx(v);
    s+=`<line x1="${X}" y1="${H-PADB}" x2="${X}" y2="${H-PADB+4}"/>`;
    s+=`<text x="${X}" y="${H-PADB+16}" text-anchor="middle">${v.toFixed(1)}</text>`;
  }
  s+=`<line x1="${PADL}" y1="${H-PADB}" x2="${W-PADR}" y2="${H-PADB}"/></g>`;

  // shaded rejection/tail region under curve
  const step=(x1-x0)/240;
  function region(cond){
    let d=`M`;
    let started=false, path="";
    for(let v=x0;v<=x1;v+=step){
      if(cond(v)){
        const X=sx(v), Y=sy(normPdf(v,MU,SE));
        if(!started){path+=`M ${X} ${H-PADB} L ${X} ${Y}`;started=true;}
        else path+=` L ${X} ${Y}`;
      } else if(started){
        path+=` L ${sx(v)} ${H-PADB} Z`;started=false;
      }
    }
    if(started)path+=` L ${sx(x1)} ${H-PADB} Z`;
    return path;
  }
  if(z!==null){
    let cond;
    const zx=Math.abs(z);
    if(tail==="two")      cond=v=>Math.abs((v-MU)/SE)>=zx;
    else if(tail==="right")cond=v=>(v-MU)/SE>=z;
    else                   cond=v=>(v-MU)/SE<=z;
    s+=`<path d="${region(cond)}" fill="var(--treat-soft)" stroke="none"/>`;
  }

  // population curve
  let curve=`M ${sx(x0)} ${sy(normPdf(x0,MU,SE))}`;
  for(let v=x0;v<=x1;v+=step) curve+=` L ${sx(v)} ${sy(normPdf(v,MU,SE))}`;
  s+=`<path d="${curve}" fill="var(--pop-fill)" stroke="var(--pop)" stroke-width="2"/>`;

  // mean line μ
  s+=`<line x1="${sx(MU)}" y1="${PADT}" x2="${sx(MU)}" y2="${H-PADB}" stroke="var(--pop)" stroke-width="1" stroke-dasharray="2 3"/>`;

  // treatment mean line
  if(xbar!==null && xbar>=x0 && xbar<=x1){
    const X=sx(xbar);
    s+=`<line x1="${X}" y1="${PADT-6}" x2="${X}" y2="${H-PADB}" stroke="var(--treat)" stroke-width="2.5"/>`;
    s+=`<circle cx="${X}" cy="${PADT-6}" r="3.5" fill="var(--treat)"/>`;
    s+=`<text x="${X}" y="${PADT-12}" text-anchor="middle" font-family="ui-monospace,monospace" font-size="11" fill="var(--treat)">x̄=${xbar.toFixed(1)}</text>`;
  } else if(xbar!==null){
    const edge=xbar<x0?PADL:W-PADR;
    s+=`<text x="${edge}" y="${PADT}" text-anchor="${xbar<x0?'start':'end'}" font-family="ui-monospace,monospace" font-size="11" fill="var(--treat)">x̄=${xbar.toFixed(1)} →off chart</text>`;
  }
  svg.innerHTML=s;
}

// Preview: just redraw the curve + μ line, no sampling. Runs while typing.
function preview(){
  readPop();
  draw(null,null);
}

// Draw n samples from Normal(sampleMean, sampleSD), test their realized mean.
function doSample(){
  readPop();
  const sMean=parseFloat(document.getElementById("mean").value);
  const sSD  =parseFloat(document.getElementById("sd").value);
  if(isNaN(sMean)||isNaN(sSD)||sSD<=0){
    document.getElementById("verdict").textContent=
      "Enter a valid sample mean and SD (SD > 0) to draw a sample.";
    draw(null,null);return;
  }

  // generate n draws, compute realized mean
  let sum=0;
  for(let i=0;i<N;i++) sum+=sMean+sSD*gauss();
  const xbar=sum/N;

  // test the realized mean against H0 using population SE = σ/√n
  const se=SE;
  const z=(xbar-MU)/se;
  let p;
  if(tail==="two")      p=2*(1-normCdf(Math.abs(z)));
  else if(tail==="right")p=1-normCdf(z);
  else                   p=normCdf(z);
  p=Math.min(1,Math.max(0,p));

  document.getElementById("z").textContent=z.toFixed(2);
  document.getElementById("se").textContent=se.toFixed(2);
  document.getElementById("p").textContent=p<0.0001?"<0.0001":p.toFixed(4);

  const sig=p<0.05;
  document.getElementById("verdict").innerHTML=
    sig
    ? `Drew ${N} samples · realized mean <b>x̄ = ${xbar.toFixed(2)}</b>.<br><b>p = ${p.toFixed(4)} < 0.05</b> — reject H₀. Significantly different from μ = ${MU}.`
    : `Drew ${N} samples · realized mean <b>x̄ = ${xbar.toFixed(2)}</b>.<br><b>p = ${p.toFixed(4)} ≥ 0.05</b> — fail to reject H₀. Consistent with μ = ${MU}.`;

  draw(xbar,z);
}

document.querySelectorAll(".tail button").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll(".tail button").forEach(x=>x.classList.remove("on"));
    b.classList.add("on"); tail=b.dataset.t;
  };
});
document.getElementById("run").onclick=doSample;
["mean","sd","mu","sigma","n"].forEach(id=>
  document.getElementById(id).addEventListener("input",preview));
preview();
</script>
</body>
</html>
